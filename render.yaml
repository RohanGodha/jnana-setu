services:
  - type: web
    name: jnana-setu-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements-docker.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false          # set in Render dashboard (Groq key)
      - key: VECTOR_BACKEND
        value: qdrant
      - key: QDRANT_URL
        sync: false          # set in Render dashboard
      - key: QDRANT_API_KEY
        sync: false          # set in Render dashboard
      - key: QDRANT_COLLECTION
        value: jnana_setu
      - key: EMBEDDING_BACKEND
        value: hash
      - key: FINAL_TOP_K
        value: "3"
      - key: JWT_SECRET
        generateValue: true
      - key: FREE_TIER_DAILY_LIMIT
        value: "3"
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL after frontend deploy
      # Persistent database (free Postgres) so users/payments survive redeploys.
      - key: DATABASE_URL
        fromDatabase:
          name: jnana-db
          property: connectionString
      # Admin + UPI monetization.
      - key: ADMIN_EMAIL
        sync: false          # your email -> full/free/unlimited access
      - key: UPI_VPA
        sync: false          # your UPI ID to receive payments
      - key: UPI_PAYEE_NAME
        value: Jnana Setu
      - key: PRO_PRICE_INR
        value: "199"
      - key: PRO_DAYS
        value: "30"

databases:
  - name: jnana-db
    plan: free
